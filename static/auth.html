<!DOCTYPE html>
<html>
<head>
    <title>Secure Login</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script>
      function getQueryParams() {
          const params = new URLSearchParams(window.location.search);
          return {
              apiKey: params.get("apiKey"),
              authDomain: params.get("authDomain"),
              projectId: params.get("projectId")
          };
      }
      
      const config = getQueryParams();
      
      if(config.apiKey) {
          firebase.initializeApp(config);
      }
      
      function signIn() {
        if(!config.apiKey) {
            alert("Configuration missing in URL.");
            return;
        }
        const provider = new firebase.auth.GoogleAuthProvider();
        firebase.auth().signInWithPopup(provider)
          .then((result) => {
            const user = result.user;
            window.location.href = "/?email=" + encodeURIComponent(user.email);
          })
          .catch((error) => {
            alert("Auth Error: " + error.message);
            window.location.href = "/";
          });
      }
      window.onload = signIn;
    </script>
</head>
<body style="background-color:#0e1117; color:white; font-family:sans-serif; text-align:center; padding-top:100px;">
    <h2>Authenticating with Google...</h2>
    <p>Please complete the secure sign-in popup to access the dashboard.</p>
</body>
</html>
